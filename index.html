<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JobPipe — job matches</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🎯</text></svg>">
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel2: #1c2129;
    --border: #2d333c;
    --text: #e6e9ee;
    --muted: #8b949e;
    --accent: #58a6ff;
    --good: #3fb950;
    --mid: #d29922;
    --bad: #f85149;
    --star: #e3b341;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 0; z-index: 10;
  }
  .head-row { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: baseline; }
  h1 { font-size: 18px; margin: 0; }
  #stats { color: var(--muted); font-size: 12.5px; }
  #warnings { margin-top: 6px; display: none; }
  .warn {
    background: #3a2d12; border: 1px solid #7a5b1e; color: #e8c56b;
    border-radius: 6px; padding: 6px 10px; font-size: 12.5px; margin-top: 4px;
  }

  #controls {
    display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
  }
  #controls label { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 6px; }
  input, select {
    background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; font-size: 13px;
  }
  input[type=range] { width: 110px; padding: 0; }
  input[type=checkbox] { accent-color: var(--accent); }
  #search { width: 190px; }
  #compFloor { width: 90px; }
  #shown-count { color: var(--muted); font-size: 12px; margin-left: auto; }

  #list {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    padding: 12px 16px 60px; max-width: 1500px; margin: 0 auto;
  }
  @media (max-width: 420px) { #list { grid-template-columns: 1fr; padding: 10px 8px 60px; } }

  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
  }
  .card.applied { border-color: #2ea04366; background: #12261a33; }
  .card.saved { border-color: #58a6ff55; }
  .card.hidden-job { opacity: .55; }
  .card-top { display: flex; gap: 10px; align-items: flex-start; }
  .badge {
    min-width: 44px; text-align: center; font-weight: 700; font-size: 15px;
    border-radius: 6px; padding: 5px 0; color: #0d1117; flex: none;
  }
  .badge.good { background: var(--good); }
  .badge.mid { background: var(--mid); }
  .badge.bad { background: var(--bad); }
  .badge.none { background: var(--border); color: var(--muted); font-size: 11px; }
  .title-block { min-width: 0; }
  .job-title { font-weight: 600; font-size: 14.5px; }
  .company { color: var(--muted); font-size: 12.5px; }
  .meta-line { color: var(--muted); font-size: 12px; display: flex; flex-wrap: wrap; gap: 4px 10px; }
  .comp { color: var(--text); }
  .pitch { font-size: 13px; color: #c4cbd4; font-style: italic; }
  .points { font-size: 12.5px; display: flex; flex-direction: column; gap: 2px; }
  .strength { color: var(--good); }
  .gap { color: var(--mid); }
  .flag { color: var(--bad); }
  .actions { display: flex; gap: 6px; margin-top: 4px; }
  .actions button {
    background: var(--panel2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  .actions button:hover { color: var(--text); border-color: var(--muted); }
  .actions button.active { color: #fff; border-color: transparent; }
  .actions button.b-applied.active { background: var(--good); color: #0d1117; }
  .actions button.b-saved.active { background: var(--accent); color: #0d1117; }
  .actions button.b-hidden.active { background: var(--bad); color: #0d1117; }
  #empty { color: var(--muted); text-align: center; padding: 50px 20px; grid-column: 1/-1; }

  .sources { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .src {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px 1px 4px; font-size: 11px; color: var(--muted);
  }
  .src svg, .src .ico { width: 13px; height: 13px; flex: none; border-radius: 2px; }
  .src .ico { display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #fff; }

  #refresh-panel {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin-top: 8px; padding: 8px 10px; background: var(--panel2);
    border: 1px solid var(--border); border-radius: 6px; font-size: 12.5px;
  }
  #refresh-panel button {
    background: var(--accent); color: #06101f; border: none; border-radius: 6px;
    padding: 6px 12px; font-size: 12.5px; font-weight: 600; cursor: pointer;
  }
  #refresh-panel button:disabled { opacity: .5; cursor: default; }
  #refresh-panel button.ghost { background: var(--panel); color: var(--muted); border: 1px solid var(--border); font-weight: 400; }
  #refresh-panel input {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px; font-size: 12.5px; min-width: 240px;
  }
  #refresh-status { color: var(--muted); }
  .rf-link { color: var(--accent); }

  #profiles { display: flex; gap: 4px; }
  .ptab {
    background: var(--panel2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px 12px; font-size: 12.5px; cursor: pointer;
  }
  .ptab.active { background: var(--accent); color: #06101f; border-color: transparent; font-weight: 600; }
  label.remote-only { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 6px; }
</style>
</style>
</head>
<body>
<header>
  <div class="head-row">
    <h1>JobPipe</h1>
    <div id="profiles"></div>
    <div id="stats">loading…</div>
  </div>
  <div id="warnings"></div>
  <div id="refresh-panel">
    <button id="rf-scrape" title="Pull fresh listings — no AI scoring, no tokens">↻ Refresh jobs (scrape only)</button>
    <button id="rf-score" class="ghost" title="Scrape and score new jobs with Claude">↻ Refresh + score</button>
    <span id="refresh-status"></span>
    <button id="rf-setup" class="ghost" style="margin-left:auto">⚙ Set up refresh</button>
  </div>
</header>

<div id="controls">
  <label>Min score <input type="range" id="minScore" min="0" max="100" step="5" value="70">
    <span id="minScoreVal">70</span></label>
  <label>Search <input type="search" id="search" placeholder="title or company"></label>
  <label>Location <input type="search" id="locSearch" placeholder="city or state"></label>
  <label class="remote-only"><input type="checkbox" id="remoteOnly"> remote only</label>
  <label>Source <select id="source"><option value="">all</option></select></label>
  <label>Comp ≥ $<input type="number" id="compFloor" step="5000" min="0" placeholder="any"></label>
  <label>Posted <select id="days">
    <option value="">any time</option>
    <option value="1">24h</option>
    <option value="3">3 days</option>
    <option value="7" selected>7 days</option>
    <option value="14">14 days</option>
    <option value="30">30 days</option>
  </select></label>
  <label><input type="checkbox" id="showUnscored"> unscored</label>
  <label><input type="checkbox" id="showHidden"> hidden</label>
  <label>Status <select id="statusFilter">
    <option value="">all</option>
    <option value="saved">saved</option>
    <option value="applied">applied</option>
  </select></label>
  <span id="shown-count"></span>
</div>

<div id="list"></div>

<script>
"use strict";
let DATA = { meta: {}, jobs: [] };
let activeProfile = "leigh";
let statuses = {};

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

// Applied/Save/Hide are tracked per profile so the two job lists never collide.
const statusKey = () => `jobpipe-status-${activeProfile}`;
function loadStatuses() {
  try { statuses = JSON.parse(localStorage.getItem(statusKey())) || {}; }
  catch (e) { statuses = {}; }
}
function saveStatuses() { localStorage.setItem(statusKey(), JSON.stringify(statuses)); }

function setStatus(id, key) {
  const cur = statuses[id] || {};
  cur[key] = !cur[key];
  if (key === "applied" && cur.applied) cur.hidden = false;
  statuses[id] = cur;
  saveStatuses();
  render();
}

function fmtComp(job) {
  if (job.comp_text) return job.comp_text;
  if (job.comp_min && job.comp_max)
    return `$${job.comp_min.toLocaleString()}–$${job.comp_max.toLocaleString()}`;
  if (job.comp_min) return `$${job.comp_min.toLocaleString()}+`;
  return "comp n/a";
}

function daysAgo(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d)) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

function badge(job) {
  const s = job.score;
  if (s == null) return `<div class="badge none">n/s</div>`;
  const cls = s >= 80 ? "good" : s >= 60 ? "mid" : "bad";
  return `<div class="badge ${cls}">${s >= 85 ? "⭐" : ""}${s}</div>`;
}

// Small source badges; brand logos for the big two, colored initials for the rest.
const LINKEDIN_SVG = `<svg viewBox="0 0 24 24" fill="#0a66c2" aria-hidden="true"><rect width="24" height="24" rx="4" fill="#0a66c2"/><path fill="#fff" d="M6.94 8.5H4.4V19h2.54V8.5ZM5.67 4.5a1.47 1.47 0 1 0 0 2.94 1.47 1.47 0 0 0 0-2.94ZM19.6 19h-2.54v-5.13c0-1.22-.02-2.8-1.7-2.8-1.71 0-1.97 1.33-1.97 2.71V19H10.8V8.5h2.44v1.43h.03c.34-.64 1.17-1.32 2.4-1.32 2.57 0 3.05 1.69 3.05 3.89V19Z"/></svg>`;
const INDEED_SVG = `<svg viewBox="0 0 24 24" aria-hidden="true"><rect width="24" height="24" rx="4" fill="#003a9b"/><path fill="#fff" d="M13.6 8.9c-1.9 1.3-4.6 2-7.6 2v.5c3.3 0 6-.7 8.1-2.2Zm-.2 2.1a2 2 0 0 0-2 2v5.3h2.4v-5c0-.4.1-.6.5-.6.1 0 .3 0 .4.1v-1.7a2.7 2.7 0 0 0-.7-.1Z"/><circle cx="13.5" cy="6.6" r="1.4" fill="#fff"/></svg>`;
const SRC_META = {
  linkedin:       { label: "LinkedIn",       svg: LINKEDIN_SVG },
  indeed:         { label: "Indeed",         svg: INDEED_SVG },
  glassdoor:      { label: "Glassdoor",      color: "#0caa41", init: "G" },
  zip_recruiter:  { label: "ZipRecruiter",   color: "#0f9d58", init: "Z" },
  google:         { label: "Google Jobs",    color: "#4285f4", init: "G" },
  remoteok:       { label: "RemoteOK",       color: "#f6c744", init: "R" },
  weworkremotely: { label: "We Work Remotely", color: "#ff5744", init: "W" },
};
function srcBadge(name) {
  const m = SRC_META[name] || { label: name, color: "#6b7280", init: (name[0] || "?").toUpperCase() };
  const icon = m.svg ? m.svg
    : `<span class="ico" style="background:${m.color}">${esc(m.init)}</span>`;
  return `<span class="src">${icon}${esc(m.label)}</span>`;
}

function card(job) {
  const st = statuses[job.id] || {};
  const cls = ["card", st.applied && "applied", st.saved && "saved", st.hidden && "hidden-job"]
    .filter(Boolean).join(" ");
  const age = daysAgo(job.date_posted ?? job.first_seen);
  const sourceList = [job.source, ...(job.alt_sources || [])].filter(Boolean);
  const sources = sourceList.map(srcBadge).join("");
  const points = [];
  if (job.strengths?.length) points.push(`<span class="strength">✓ ${esc(job.strengths[0])}</span>`);
  if (job.gaps?.length) points.push(`<span class="gap">△ ${esc(job.gaps[0])}</span>`);
  for (const f of job.flags || []) points.push(`<span class="flag">⚑ ${esc(f)}</span>`);
  return `<div class="${cls}">
    <div class="card-top">
      ${badge(job)}
      <div class="title-block">
        <div class="job-title"><a href="${esc(job.url)}" target="_blank" rel="noopener noreferrer">${esc(job.title)}</a></div>
        <div class="company">${esc(job.company)} · ${esc(job.location)}</div>
      </div>
    </div>
    <div class="meta-line">
      <span class="comp">${esc(fmtComp(job))}</span>
      <span class="sources">${sources}</span>
      ${age != null ? `<span>${age === 0 ? "today" : age + "d ago"}</span>` : ""}
    </div>
    ${job.one_line_pitch ? `<div class="pitch">${esc(job.one_line_pitch)}</div>` : ""}
    ${points.length ? `<div class="points">${points.join("")}</div>` : ""}
    <div class="actions">
      <button class="b-applied ${st.applied ? "active" : ""}" data-id="${job.id}" data-k="applied">${st.applied ? "✓ Applied" : "Applied"}</button>
      <button class="b-saved ${st.saved ? "active" : ""}" data-id="${job.id}" data-k="saved">${st.saved ? "★ Saved" : "Save"}</button>
      <button class="b-hidden ${st.hidden ? "active" : ""}" data-id="${job.id}" data-k="hidden">${st.hidden ? "Unhide" : "Hide"}</button>
    </div>
  </div>`;
}

function filters() {
  return {
    minScore: +$("minScore").value,
    q: $("search").value.trim().toLowerCase(),
    loc: $("locSearch").value.trim().toLowerCase(),
    remoteOnly: $("remoteOnly").checked,
    source: $("source").value,
    compFloor: +$("compFloor").value || 0,
    days: $("days").value ? +$("days").value : null,
    showUnscored: $("showUnscored").checked,
    showHidden: $("showHidden").checked,
    status: $("statusFilter").value,
  };
}

function visible(job, f) {
  const st = statuses[job.id] || {};
  if (st.hidden && !f.showHidden) return false;
  if (f.status === "saved" && !st.saved) return false;
  if (f.status === "applied" && !st.applied) return false;
  if (job.score == null) { if (!f.showUnscored) return false; }
  else if (job.score < f.minScore) return false;
  if (f.q && !(job.title + " " + job.company).toLowerCase().includes(f.q)) return false;
  if (f.loc && !(job.location || "").toLowerCase().includes(f.loc)) return false;
  if (f.remoteOnly && !(job.remote || /remote|anywhere/i.test(job.location || ""))) return false;
  if (f.source && job.source !== f.source && !(job.alt_sources || []).includes(f.source)) return false;
  if (f.compFloor && (job.comp_max ?? job.comp_min ?? 0) < f.compFloor) return false;
  if (f.days != null) {
    const age = daysAgo(job.date_posted ?? job.first_seen);
    if (age == null || age > f.days) return false;
  }
  return true;
}

function render() {
  const f = filters();
  $("minScoreVal").textContent = f.minScore;
  const shown = DATA.jobs.filter(j => visible(j, f));
  $("list").innerHTML = shown.length
    ? shown.map(card).join("")
    : `<div id="empty">No jobs match the current filters.</div>`;
  $("shown-count").textContent = `${shown.length} / ${DATA.jobs.length} shown`;
  for (const btn of document.querySelectorAll(".actions button"))
    btn.addEventListener("click", () => setStatus(btn.dataset.id, btn.dataset.k));
}

function renderHeader() {
  const m = DATA.meta || {};
  const last = m.last_run ? new Date(m.last_run).toLocaleString() : "never";
  $("stats").textContent =
    `last run ${last} · ${m.scraped_this_run ?? 0} scraped · ${m.new_this_run ?? 0} new · ` +
    `${m.high_matches ?? 0} high matches (85+) · ${m.total ?? DATA.jobs.length} tracked`;
  const warnBox = $("warnings");
  const warns = [];
  if (m.scoring_warning) warns.push(`Scoring: ${m.scoring_warning}`);
  const fails = m.source_failures || [];
  if (fails.length) {
    const names = [...new Set(fails.map(x => x.source.split(":")[0]))].join(", ");
    warns.push(`Source failures this run: ${names} (${fails.length} calls failed — API/RSS fallbacks still active)`);
  }
  warnBox.style.display = warns.length ? "block" : "none";
  warnBox.innerHTML = warns.map(w => `<div class="warn">⚠ ${esc(w)}</div>`).join("");
}

// ---- In-page workflow trigger -------------------------------------------
// Uses a fine-grained GitHub token the user pastes once. It is stored ONLY in
// this browser's localStorage (never committed, never sent anywhere but
// api.github.com) and needs just Actions: read+write on this one repo.
const GH_OWNER = "LeveragedPixel", GH_REPO = "jopepipe";
const TOKEN_KEY = "jobpipe-gh-token";
const getToken = () => localStorage.getItem(TOKEN_KEY) || "";

function setRfStatus(msg, isLink) {
  $("refresh-status").innerHTML = isLink ? msg : esc(msg);
}

async function triggerRun(skipScoring) {
  const token = getToken();
  if (!token) { promptForToken(); return; }
  const btns = ["rf-scrape", "rf-score"].map($);
  btns.forEach(b => b.disabled = true);
  setRfStatus(skipScoring ? "Starting scrape…" : "Starting scrape + score…");
  try {
    const resp = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/actions/workflows/pipeline.yml/dispatches`,
      { method: "POST",
        headers: { "Accept": "application/vnd.github+json",
                   "Authorization": `Bearer ${token}`,
                   "X-GitHub-Api-Version": "2022-11-28" },
        body: JSON.stringify({ ref: "main", inputs: { skip_scoring: skipScoring } }) });
    if (resp.status === 204) {
      setRfStatus('Run started ✓ — jobs refresh in a few minutes. <a class="rf-link" href="https://github.com/' +
        GH_OWNER + '/' + GH_REPO + '/actions" target="_blank" rel="noopener">watch progress</a>', true);
    } else if (resp.status === 401 || resp.status === 403) {
      setRfStatus("Token rejected — click ⚙ Set up refresh to paste a valid token.");
      localStorage.removeItem(TOKEN_KEY);
    } else {
      const body = await resp.json().catch(() => ({}));
      setRfStatus(`GitHub error ${resp.status}: ${body.message || "unknown"}`);
    }
  } catch (e) {
    setRfStatus("Network error contacting GitHub — try again.");
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

function promptForToken() {
  const help = "Paste a GitHub fine-grained token (Actions: Read and write on " +
    GH_OWNER + "/" + GH_REPO + "). It stays only in this browser.\n\n" +
    "Create one at github.com/settings/tokens?type=beta";
  const t = window.prompt(help, getToken());
  if (t === null) return;
  const trimmed = t.trim();
  if (trimmed) { localStorage.setItem(TOKEN_KEY, trimmed); setRfStatus("Token saved ✓ — click Refresh jobs."); }
  else { localStorage.removeItem(TOKEN_KEY); setRfStatus("Token cleared."); }
}

function wireRefresh() {
  $("rf-scrape").addEventListener("click", () => triggerRun(true));
  $("rf-score").addEventListener("click", () => triggerRun(false));
  $("rf-setup").addEventListener("click", promptForToken);
  if (!getToken()) setRfStatus("Tip: click ⚙ Set up refresh once to enable the buttons.");
}

async function loadProfile(id) {
  activeProfile = id;
  loadStatuses();
  // Reflect the active tab
  for (const tab of document.querySelectorAll(".ptab"))
    tab.classList.toggle("active", tab.dataset.id === id);
  try { history.replaceState(null, "", `?profile=${encodeURIComponent(id)}`); } catch (e) {}
  try {
    const resp = await fetch(`data/jobs-${id}.json`, { cache: "no-store" });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();
    DATA.jobs = DATA.jobs || [];
  } catch (e) {
    $("stats").textContent = `could not load data/jobs-${id}.json — has the pipeline run for this profile yet?`;
    $("list").innerHTML = "";
    return;
  }
  const sources = [...new Set(DATA.jobs.flatMap(j => [j.source, ...(j.alt_sources || [])]))].sort();
  $("source").innerHTML = `<option value="">all</option>` +
    sources.map(s => `<option>${esc(s)}</option>`).join("");
  $("showUnscored").checked = !DATA.jobs.some(j => j.score != null);
  renderHeader();
  render();
}

async function init() {
  wireRefresh();
  // Discover profiles; fall back to a single default if the index isn't there.
  let profiles = [{ id: "leigh", name: "Leigh" }];
  try {
    const resp = await fetch("data/profiles-index.json", { cache: "no-store" });
    if (resp.ok) { const idx = await resp.json(); if (idx.profiles?.length) profiles = idx.profiles; }
  } catch (e) {}
  // Only show the switcher when there's more than one profile.
  $("profiles").innerHTML = profiles.length > 1
    ? profiles.map(p => `<button class="ptab" data-id="${esc(p.id)}">${esc(p.name)}</button>`).join("")
    : "";
  for (const tab of document.querySelectorAll(".ptab"))
    tab.addEventListener("click", () => loadProfile(tab.dataset.id));

  for (const id of ["minScore", "search", "locSearch", "remoteOnly", "source",
                    "compFloor", "days", "showUnscored", "showHidden", "statusFilter"])
    $(id).addEventListener("input", render);

  const wanted = new URLSearchParams(location.search).get("profile");
  const start = profiles.find(p => p.id === wanted)?.id || profiles[0].id;
  await loadProfile(start);
}
init();
</script>
</body>
</html>
